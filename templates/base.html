<!DOCTYPE html>
<html>
<head>
    <title>Leave Request System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/api/leaves/dashboard/">
    Leave System
</a>

        <div class="ms-auto">
            <a href="/api/leaves/dashboard/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/api/leaves/my-leaves/" class="btn btn-outline-light btn-sm me-2">My Leaves</a>
            <a href="/api/leaves/apply/" class="btn btn-primary btn-sm me-2">Apply Leave</a>

            {% if request.user.is_authenticated %}
                <span class="text-white me-2">{{ request.user.username }}</span>
                <a href="/api/leaves/logout/" class="btn btn-danger btn-sm">Logout</a>
            {% else %}
                <a href="/api/leaves/login/" class="btn btn-success btn-sm">Login</a>
            {% endif %}

            <a href="https://github.com/faarhaxx"
               target="_blank"
               class="btn btn-outline-light btn-sm me-2">
            GitHub
            </a>
        </div>
    </div>
</nav>

</body>
</html>

{% block content %}
{% endblock %}
