{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

```
<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg">

            <div class="card-header bg-primary text-white p-4">
                <h2 class="mb-0">📝 Apply for Leave</h2>
                <small>Submit your leave request for approval</small>
            </div>

            <div class="card-body p-5">

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            Workspace
                        </label>

                        <select name="workspace"
                                class="form-select"
                                required>

                            {% for workspace in workspaces %}
                                <option value="{{ workspace.id }}">
                                    {{ workspace.name }}
                                </option>
                            {% endfor %}

                        </select>
                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Leave Reason
                        </label>

                        <textarea
                            name="reason"
                            rows="5"
                            class="form-control"
                            placeholder="Enter reason for leave..."
                            required></textarea>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-bold">
                                Start Date
                            </label>

                            <input
                                type="date"
                                name="start_date"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-bold">
                                End Date
                            </label>

                            <input
                                type="date"
                                name="end_date"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{% url 'my_leaves_page' %}"
                           class="btn btn-outline-secondary btn-lg">
                            ← My Leaves
                        </a>

                        <button type="submit"
                                class="btn btn-primary btn-lg">
                            Submit Request 🚀
                        </button>

                    </div>

                </form>

            </div>

        </div>

        <div class="card border-0 shadow-sm mt-4">
            <div class="card-body text-center">

                <h5>💡 Tips</h5>

                <p class="text-muted mb-0">
                    Make sure your leave dates are correct before
                    submitting the request. Managers and admins
                    will review your application.
                </p>

            </div>
        </div>

    </div>

</div>
```

</div>

{% endblock %}
